# Dev environment: backend (FastAPI) + frontend (Vite) with hot reload.
# Source code is bind-mounted, so edits on the host are reflected immediately.
#
# Run: docker compose -f docker-compose.dev.yml up -d

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
